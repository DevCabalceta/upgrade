<div th:fragment="floatingSocialBar">
    <div 
        id="floating-social-bar" 
        class="hidden md:flex fixed right-4 top-1/2 -translate-y-1/2 z-40 flex-col gap-2 transition-all duration-500 ease-out opacity-0 translate-x-6 pointer-events-none"
    >
        <a
            href="https://facebook.com"
            target="_blank"
            rel="noreferrer"
            aria-label="Facebook"
            class="h-10 w-10 grid place-items-center rounded-full border border-border bg-card/90 backdrop-blur text-muted-foreground shadow-sm transition-all duration-300 hover:scale-110 hover:shadow-md hover:border-primary/40 hover:text-[#1877F2]"
        >
            <i data-lucide="facebook" class="h-[18px] w-[18px]"></i>
        </a>

        <a
            href="https://instagram.com"
            target="_blank"
            rel="noreferrer"
            aria-label="Instagram"
            class="h-10 w-10 grid place-items-center rounded-full border border-border bg-card/90 backdrop-blur text-muted-foreground shadow-sm transition-all duration-300 hover:scale-110 hover:shadow-md hover:border-primary/40 hover:text-[#E4405F]"
        >
            <i data-lucide="instagram" class="h-[18px] w-[18px]"></i>
        </a>

        <a
            href="https://wa.me/525551234567"
            target="_blank"
            rel="noreferrer"
            aria-label="WhatsApp"
            class="h-10 w-10 grid place-items-center rounded-full border border-border bg-card/90 backdrop-blur text-muted-foreground shadow-sm transition-all duration-300 hover:scale-110 hover:shadow-md hover:border-primary/40 hover:text-[#25D366]"
        >
            <i data-lucide="message-circle" class="h-[18px] w-[18px]"></i>
        </a>

        <a
            href="https://linkedin.com"
            target="_blank"
            rel="noreferrer"
            aria-label="LinkedIn"
            class="h-10 w-10 grid place-items-center rounded-full border border-border bg-card/90 backdrop-blur text-muted-foreground shadow-sm transition-all duration-300 hover:scale-110 hover:shadow-md hover:border-primary/40 hover:text-[#0A66C2]"
        >
            <i data-lucide="linkedin" class="h-[18px] w-[18px]"></i>
        </a>
    </div>
</div>
