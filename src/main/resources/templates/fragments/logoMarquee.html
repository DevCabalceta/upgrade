<div th:fragment="logoMarquee">
    <div class="relative mt-20" data-reveal="fade-up">
        <div class="text-center text-xs font-semibold uppercase tracking-[0.2em] text-muted-foreground">
            Confían en nosotros marcas líderes
        </div>

        <div class="relative mt-8 overflow-hidden">
            <div class="pointer-events-none absolute inset-y-0 left-0 w-24 z-10 bg-gradient-to-r from-background to-transparent"></div>
            <div class="pointer-events-none absolute inset-y-0 right-0 w-24 z-10 bg-gradient-to-l from-background to-transparent"></div>

            <div class="flex w-max animate-marquee gap-10 py-2 will-change-transform marquee-container">
                <th:block th:each="loop : ${#numbers.sequence(1, 2)}">
                    <div th:each="name : ${ {'Coca-Cola', 'Microsoft', 'Samsung', 'Sony', 'Intel', 'IBM', 'HP', 'Dell', 'Adobe', 'Cisco', 'Oracle', 'Spotify'} }" 
                         class="group flex h-14 min-w-[160px] items-center justify-center rounded-xl border border-border bg-card px-6 transition-all duration-300 hover:border-primary/40 hover:shadow-md">
                        
                        <span class="text-base font-bold tracking-tight text-muted-foreground grayscale opacity-70 transition-all duration-300 group-hover:opacity-100 group-hover:text-foreground group-hover:scale-110" 
                              th:text="${name}">
                            Nombre de Marca
                        </span>
                        
                    </div>
                </th:block>
            </div>
        </div>

        <style>
            @keyframes marquee {
                from { transform: translateX(0); }
                to   { transform: translateX(-50%); }
            }
            
            .animate-marquee { 
                animation: marquee 38s linear infinite; 
            }
        </style>
    </div>
</div>
