<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="sidebar(activeMenu)">
        <div id="mobile-overlay" class="fixed inset-0 z-30 bg-black/40 hidden lg:hidden"></div>

        <aside id="app-sidebar" class="fixed inset-y-0 left-0 z-40 flex flex-col bg-sidebar text-sidebar-foreground border-r border-sidebar-border transition-all duration-300 w-[256px] -translate-x-full lg:translate-x-0">
            <div class="flex h-16 items-center justify-between px-4 border-b border-sidebar-border">
                <a th:href="@{/admin/dashboard}" class="flex items-center gap-2 overflow-hidden">
                    <img th:src="@{/assets/upgrade-logo.png}" alt="Upgrade!" class="h-9 w-auto sidebar-logo-full" draggable="false">
                    <div class="hidden h-9 w-9 rounded-md bg-black flex items-center justify-center sidebar-logo-mark">
                        <span class="text-primary font-black">u!</span>
                    </div>
                </a>
                <button id="close-mobile-menu" class="lg:hidden text-sidebar-foreground/70 hover:text-sidebar-foreground">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1">
                
                <a th:href="@{/admin/dashboard}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'dashboard' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Dashboard">
                    <i data-lucide="layout-dashboard" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'dashboard' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Dashboard</span>
                    <span th:if="${activeMenu == 'dashboard'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/clientes}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'clientes' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Clientes">
                    <i data-lucide="users" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'clientes' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Clientes</span>
                    <span th:if="${activeMenu == 'clientes'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/inventario}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'inventario' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Inventario">
                    <i data-lucide="package" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'inventario' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Inventario</span>
                    <span th:if="${activeMenu == 'inventario'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/servicios}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'servicios' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Servicios">
                    <i data-lucide="sparkles" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'servicios' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Servicios</span>
                    <span th:if="${activeMenu == 'servicios'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/cotizaciones}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'cotizaciones' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Cotizaciones">
                    <i data-lucide="file-text" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'cotizaciones' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Cotizaciones</span>
                    <span th:if="${activeMenu == 'cotizaciones'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/calendario}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'calendario' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Calendario">
                    <i data-lucide="calendar" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'calendario' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Calendario</span>
                    <span th:if="${activeMenu == 'calendario'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/prestamos}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'prestamos' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Préstamos">
                    <i data-lucide="hand-coins" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'prestamos' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Préstamos</span>
                    <span th:if="${activeMenu == 'prestamos'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/mantenimiento}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'mantenimiento' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Mantenimiento">
                    <i data-lucide="wrench" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'mantenimiento' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Mantenimiento</span>
                    <span th:if="${activeMenu == 'mantenimiento'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/colaboradores}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'colaboradores' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Colaboradores">
                    <i data-lucide="user-cog" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'colaboradores' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Colaboradores</span>
                    <span th:if="${activeMenu == 'colaboradores'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/roles}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'roles' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Roles y Permisos">
                    <i data-lucide="shield-check" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'roles' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Roles y Permisos</span>
                    <span th:if="${activeMenu == 'roles'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/galeria}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'galeria' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Galería">
                    <i data-lucide="image" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'galeria' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Galería</span>
                    <span th:if="${activeMenu == 'galeria'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

                <a th:href="@{/admin/configuracion}" 
                   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-all"
                   th:classappend="${activeMenu == 'configuracion' ? 'bg-sidebar-accent text-sidebar-primary' : 'text-sidebar-foreground/70 hover:bg-sidebar-accent hover:text-sidebar-foreground'}"
                   title="Configuración">
                    <i data-lucide="settings" class="h-[18px] w-[18px] shrink-0" th:classappend="${activeMenu == 'configuracion' ? 'text-primary' : ''}"></i>
                    <span class="truncate sidebar-label">Configuración</span>
                    <span th:if="${activeMenu == 'configuracion'}" class="ml-auto h-1.5 w-1.5 rounded-full bg-primary sidebar-indicator"></span>
                </a>

            </nav>

            <div class="p-3 border-t border-sidebar-border">
                <div id="sidebar-premium-card" class="rounded-xl bg-sidebar-accent/60 p-3">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-primary to-yellow-400 flex items-center justify-center">
                            <i data-lucide="sparkles" class="h-4 w-4 text-black"></i>
                        </div>
                        <div class="text-xs">
                            <div class="font-semibold">Plan Premium</div>
                            <div class="text-sidebar-foreground/60">Renueva en 28 días</div>
                        </div>
                    </div>
                    <button class="w-full h-8 rounded-md bg-primary text-primary-foreground text-xs font-medium hover:bg-primary/90">
                        Ver detalles
                    </button>
                </div>
                <button id="toggle-sidebar" class="mt-3 hidden lg:flex w-full items-center justify-center gap-2 rounded-lg py-2 text-xs text-sidebar-foreground/60 hover:bg-sidebar-accent hover:text-sidebar-foreground hover:cursor-pointer">
                    <i data-lucide="chevrons-left" class="h-4 w-4 collapse-icon"></i> 
                    <span class="sidebar-label">Colapsar</span>
                </button>
            </div>
        </aside>
    </div>
</body>
</html>
