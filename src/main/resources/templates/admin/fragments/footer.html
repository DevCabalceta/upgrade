<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:fragment="scripts">
        <script>
            $(document).ready(function() {
                // Inicializar íconos Lucide
                lucide.createIcons();

                // 1. Lógica del Modo Oscuro (Tailwind classes)
                $('#theme-toggle').on('click', function() {
                    $('html').toggleClass('dark');
                    var isDark = $('html').hasClass('dark');
                    localStorage.setItem(STORAGE_KEY, isDark ? 'dark' : 'light');
                });

                // 2. Lógica Menú Móvil
                $('#open-mobile-menu').on('click', function() {
                    $('#app-sidebar').removeClass('-translate-x-full');
                    $('#mobile-overlay').removeClass('hidden');
                });

                $('#close-mobile-menu, #mobile-overlay').on('click', function() {
                    $('#app-sidebar').addClass('-translate-x-full');
                    $('#mobile-overlay').addClass('hidden');
                });

                // 3. Lógica Colapsar Sidebar (Desktop)
                let isCollapsed = false;
                $('#toggle-sidebar').on('click', function() {
                    isCollapsed = !isCollapsed;
                    if(isCollapsed) {
                        // Estado Colapsado
                        $('#app-sidebar').removeClass('w-[256px]').addClass('w-[76px]');
                        $('#main-wrapper').removeClass('lg:pl-[256px]').addClass('lg:pl-[76px]');
                        $('.sidebar-label, #sidebar-premium-card, .sidebar-indicator').addClass('hidden');
                        $('.sidebar-logo-full').addClass('hidden');
                        $('.sidebar-logo-mark').removeClass('hidden').addClass('flex');
                        $('.collapse-icon').attr('data-lucide', 'chevrons-right');
                        $('#app-sidebar a.group').addClass('justify-center px-2').removeClass('px-3');
                    } else {
                        // Estado Expandido
                        $('#app-sidebar').removeClass('w-[76px]').addClass('w-[256px]');
                        $('#main-wrapper').removeClass('lg:pl-[76px]').addClass('lg:pl-[256px]');
                        $('.sidebar-label, #sidebar-premium-card, .sidebar-indicator').removeClass('hidden');
                        $('.sidebar-logo-full').removeClass('hidden');
                        $('.sidebar-logo-mark').addClass('hidden').removeClass('flex');
                        $('.collapse-icon').attr('data-lucide', 'chevrons-left');
                        $('#app-sidebar a.group').removeClass('justify-center px-2').addClass('px-3');
                    }
                    lucide.createIcons();
                });

                // 4. Lógica Menú Desplegable (Usuario)
                $('#user-menu-btn').on('click', function(e) {
                    e.stopPropagation();
                    $('#user-dropdown').toggleClass('hidden');
                });

                // Cerrar dropdown al hacer clic fuera
                $(document).on('click', function(e) {
                    if (!$(e.target).closest('#user-dropdown').length) {
                        $('#user-dropdown').addClass('hidden');
                    }
                });
            });
        </script>
    </th:block>
</body>
</html>
