<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <div th:fragment="topbar(pageTitle)">
        <header class="sticky top-0 z-30 h-16 w-full bg-background/85 backdrop-blur-xl border-b border-border">
            <div class="h-full w-full px-3 lg:px-5 flex items-center gap-3 lg:gap-5">
                <button id="open-mobile-menu" class="lg:hidden shrink-0">
                    <i data-lucide="menu" class="h-5 w-5"></i>
                </button>

                <div class="hidden md:flex items-center shrink-0 text-sm text-muted-foreground gap-1.5 min-w-0 max-w-[280px]">
                    <span class="flex items-center gap-1.5 min-w-0"><span class="truncate">App</span></span>
                    <span class="flex items-center gap-1.5 min-w-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right h-3.5 w-3.5 shrink-0" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
                        <span class="truncate text-foreground font-semibold" th:text="${pageTitle != null ? pageTitle : 'Sistema'}">Sistema</span>
                    </span>
                </div>

                <span class="hidden md:block h-6 w-px bg-border shrink-0"></span>

                <div class="flex-1 min-w-0">
                    <div class="relative w-full">
                        <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground"></i>
                        <input type="text" placeholder="Buscar clientes, equipos, órdenes de mantenimiento, cotizaciones, eventos…" class="w-full pl-10 pr-24 h-10 rounded-lg bg-muted/50 border-transparent hover:bg-muted focus-visible:bg-card focus-visible:border-primary/40 focus-visible:ring-1 focus-visible:ring-primary/30 transition-colors outline-none text-sm">
                        <div class="hidden md:flex absolute right-2 top-1/2 -translate-y-1/2 items-center gap-1">
                            <kbd class="inline-flex items-center rounded border border-border bg-background px-1.5 py-0.5 text-[10px] font-medium text-muted-foreground">⌘</kbd>
                            <kbd class="inline-flex items-center rounded border border-border bg-background px-1.5 py-0.5 text-[10px] font-medium text-muted-foreground">K</kbd>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-1 shrink-0 relative">
                    <button class="hidden lg:inline-flex items-center justify-center gap-2 h-9 px-4 rounded-md bg-primary text-primary-foreground hover:bg-primary/90 font-semibold text-sm">
                        <i data-lucide="plus" class="h-4 w-4"></i> Crear
                    </button>
                    <span class="hidden lg:block h-6 w-px bg-border mx-1"></span>

                    <button class="relative h-9 w-9 rounded-md hover:bg-accent hover:text-accent-foreground flex items-center justify-center">
                        <i data-lucide="message-square" class="h-[18px] w-[18px]"></i>
                        <span class="absolute top-1.5 right-1.5 h-2 w-2 rounded-full bg-primary ring-2 ring-background"></span>
                    </button>
                    <button class="relative h-9 w-9 rounded-md hover:bg-accent hover:text-accent-foreground flex items-center justify-center">
                        <i data-lucide="bell" class="h-[18px] w-[18px]"></i>
                        <span class="absolute top-0.5 right-0.5 h-4 min-w-4 px-1 rounded-full bg-red-500 text-[10px] font-bold text-white flex items-center justify-center ring-2 ring-background">3</span>
                    </button>
                    
                    <button id="theme-toggle" class="h-9 w-9 rounded-md hover:bg-accent hover:text-accent-foreground flex items-center justify-center">
                        <i data-lucide="moon" class="h-[18px] w-[18px] block dark:hidden"></i>
                        <span class="h-[18px] w-[18px] hidden dark:block" data-lucide="sun"></span>
                    </button>

                    <span class="h-6 w-px bg-border mx-1"></span>
                    
                    <button id="user-menu-btn" class="flex items-center gap-2 rounded-full hover:bg-muted p-1 pr-2.5 transition hover:cursor-pointer outline-none">
                        <div class="relative flex h-8 w-8 shrink-0 overflow-hidden rounded-full bg-gradient-to-tr from-primary to-yellow-400 items-center justify-center text-black font-bold text-xs"
                             sec:authentication="principal.iniciales">
                            GC
                        </div>
                        <div class="hidden xl:block text-left">
                            <div class="text-xs font-semibold leading-none" sec:authentication="principal.nombreCompleto">Gabriel Cabalceta</div>
                            <div class="text-[10px] text-muted-foreground leading-none mt-1">Administrador</div>
                        </div>
                    </button>

                    <div id="user-dropdown" class="hidden absolute right-0 top-12 mt-1 w-56 rounded-md border border-border bg-background p-1 text-foreground shadow-lg z-50">
                        <div class="px-2 py-1.5 text-sm font-semibold">Mi cuenta</div>
                        <div class="-mx-1 my-1 h-px bg-muted"></div>
                        <a href="#" class="relative flex cursor-default select-none items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-accent hover:text-accent-foreground">Perfil</a>
                        <a href="#" class="relative flex cursor-default select-none items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-accent hover:text-accent-foreground">Configuración</a>
                        <div class="-mx-1 my-1 h-px bg-muted"></div>
                        <a th:href="@{/login}" class="relative flex cursor-default select-none items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-accent hover:text-accent-foreground">Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </header>
    </div>
</body>
</html>
