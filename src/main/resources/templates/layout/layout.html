<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title th:replace="${title}">Upgrade!</title>
    
    <meta name="description" content="Producción audiovisual, sonido profesional, iluminación, pantallas LED y alquiler de equipos para eventos.">
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      /*<![CDATA[*/
      /* 1. Variantes personalizadas y Tema */
      @custom-variant dark (&:is(.dark *));

      @theme inline {
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --radius-xl: calc(var(--radius) + 4px);
        --radius-2xl: calc(var(--radius) + 8px);
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-popover: var(--popover);
        --color-popover-foreground: var(--popover-foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-accent-foreground: var(--accent-foreground);
        --color-destructive: var(--destructive);
        --color-destructive-foreground: var(--destructive-foreground);
        --color-success: var(--success);
        --color-success-foreground: var(--success-foreground);
        --color-warning: var(--warning);
        --color-warning-foreground: var(--warning-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --color-sidebar: var(--sidebar);
        --color-sidebar-foreground: var(--sidebar-foreground);
        --color-sidebar-primary: var(--sidebar-primary);
        --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
        --color-sidebar-accent: var(--sidebar-accent);
        --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
        --color-sidebar-border: var(--sidebar-border);
        --color-sidebar-ring: var(--sidebar-ring);
        --color-chart-1: var(--chart-1);
        --color-chart-2: var(--chart-2);
        --color-chart-3: var(--chart-3);
        --color-chart-4: var(--chart-4);
        --color-chart-5: var(--chart-5);
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      }

      /* 2. Variables de Color (Light/Dark) */
      :root {
        --radius: 0.75rem;
        --background: oklch(0.985 0.005 220);
        --foreground: oklch(0.22 0.02 260);
        --card: oklch(1 0 0);
        --card-foreground: oklch(0.22 0.02 260);
        --popover: oklch(1 0 0);
        --popover-foreground: oklch(0.22 0.02 260);
        --primary: oklch(0.79 0.16 175);
        --primary-foreground: oklch(0.15 0.02 260);
        --secondary: oklch(0.965 0.005 220);
        --secondary-foreground: oklch(0.22 0.02 260);
        --muted: oklch(0.965 0.005 220);
        --muted-foreground: oklch(0.55 0.02 260);
        --accent: oklch(0.95 0.04 175);
        --accent-foreground: oklch(0.22 0.02 260);
        --destructive: oklch(0.63 0.22 27);
        --destructive-foreground: oklch(0.99 0 0);
        --success: oklch(0.72 0.17 152);
        --success-foreground: oklch(0.15 0.02 260);
        --warning: oklch(0.78 0.16 75);
        --warning-foreground: oklch(0.15 0.02 260);
        --border: oklch(0.92 0.006 250);
        --input: oklch(0.92 0.006 250);
        --ring: oklch(0.79 0.16 175);
      }

      .dark {
        --background: oklch(0.14 0.01 260);
        --foreground: oklch(0.98 0.003 220);
        --card: oklch(0.19 0.01 260);
        --card-foreground: oklch(0.98 0.003 220);
        --popover: oklch(0.19 0.01 260);
        --popover-foreground: oklch(0.98 0.003 220);
        --primary: oklch(0.82 0.17 175);
        --primary-foreground: oklch(0.14 0.01 260);
        --secondary: oklch(0.24 0.01 260);
        --secondary-foreground: oklch(0.98 0.003 220);
        --muted: oklch(0.24 0.01 260);
        --muted-foreground: oklch(0.72 0.02 260);
        --accent: oklch(0.28 0.04 175);
        --accent-foreground: oklch(0.98 0.003 220);
        --destructive: oklch(0.65 0.22 27);
        --destructive-foreground: oklch(0.99 0 0);
        --success: oklch(0.72 0.17 152);
        --success-foreground: oklch(0.14 0.01 260);
        --warning: oklch(0.78 0.16 75);
        --warning-foreground: oklch(0.14 0.01 260);
        --border: oklch(1 0 0 / 10%);
        --input: oklch(1 0 0 / 15%);
        --ring: oklch(0.82 0.17 175);
      }

      /* 3. Capas base y globales */
      @layer base {
        * { border-color: var(--color-border); }
        html { scroll-behavior: smooth; }
        html, body { font-family: var(--font-sans); }
        body {
          background-color: var(--color-background);
          color: var(--color-foreground);
          -webkit-font-smoothing: antialiased;
          transition: background-color 0.4s ease, color 0.4s ease;
        }
        @media (prefers-reduced-motion: reduce) {
          html { scroll-behavior: auto; }
        }
      }

      /* 4. Animaciones y Grid Masonry */
      @layer utilities {
        [data-reveal] {
          opacity: 0;
          transition: opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
                      transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
          will-change: opacity, transform;
        }
        [data-reveal="fade-up"] { transform: translate3d(0, 28px, 0); }
        [data-reveal="fade-right"] { transform: translate3d(-28px, 0, 0); }
        [data-reveal="fade-left"] { transform: translate3d(28px, 0, 0); }
        [data-reveal="zoom-in"] { transform: scale(0.94); }
        [data-reveal="fade-in"] { transform: none; }
        [data-reveal].is-revealed {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1);
        }
        @media (prefers-reduced-motion: reduce) {
          [data-reveal] { opacity: 1 !important; transform: none !important; transition: none !important; }
        }

        .masonry { column-gap: 1.25rem; }
        @media (min-width: 768px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        @media (min-width: 1280px) { .masonry { column-count: 3; column-gap: 1.5rem; } }
        .masonry > * {
          break-inside: avoid;
          -webkit-column-break-inside: avoid;
          page-break-inside: avoid;
          margin-bottom: 1.25rem;
          display: block;
        }
      }

      /* 5. Utilidades personalizadas */
      @utility glass-card {
        background: color-mix(in oklab, var(--card) 80%, transparent);
        backdrop-filter: blur(12px);
        border: 1px solid color-mix(in oklab, var(--border) 80%, transparent);
      }
      @utility brand-gradient {
        background: linear-gradient(135deg, oklch(0.79 0.16 175) 0%, oklch(0.65 0.16 200) 100%);
      }
      @utility text-brand-gradient {
        background: linear-gradient(135deg, oklch(0.79 0.16 175) 0%, oklch(0.6 0.18 220) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* 6. TRADUCCIÓN DEL COMPONENTE BUTTON */
      @layer components {
        .btn {
          @apply inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium cursor-pointer transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 disabled:cursor-not-allowed;
        }
        .btn svg {
          @apply pointer-events-none size-4 shrink-0;
        }
        .btn-default { @apply bg-primary text-primary-foreground shadow hover:bg-primary/90; }
        .btn-destructive { @apply bg-destructive text-destructive-foreground shadow-sm hover:bg-destructive/90; }
        .btn-outline { @apply border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground; }
        .btn-secondary { @apply bg-secondary text-secondary-foreground shadow-sm hover:bg-secondary/80; }
        .btn-ghost { @apply hover:bg-accent hover:text-accent-foreground; }
        .btn-link { @apply text-primary underline-offset-4 hover:underline; }
        .btn-size-default { @apply h-9 px-4 py-2; }
        .btn-size-sm { @apply h-8 rounded-md px-3 text-xs; }
        .btn-size-lg { @apply h-10 rounded-md px-8; }
        .btn-size-icon { @apply h-9 w-9; }
      }
      /*]]>*/
    </style>
    
    <link rel="stylesheet" th:href="@{/dist/css/styles.css}">
    <script th:src="@{/dist/js/lucide.min.js}"></script>
    <script th:src="@{/dist/js/jquery-3.7.1.min.js}"></script>
</head>
<body class="min-h-screen bg-background">
    
    <div th:replace="~{fragments/landingNav :: landingNav}"></div>

    <main th:replace="${content}"></main>

    <div th:replace="~{fragments/siteFooter :: siteFooter}"></div>
    <div th:replace="~{fragments/floatingSocialBar :: floatingSocialBar}"></div>
    <div th:replace="~{fragments/scrollToTop :: scrollToTop}"></div>

    <script th:src="@{/dist/js/main.js}"></script>
</body>
</html>
